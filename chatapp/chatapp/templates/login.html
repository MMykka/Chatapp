{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block body %}
<main class="auth-screen">
  <div class="auth-card">
    <div class="auth-mark">CA</div>
    <h1>Company Assistant</h1>
    <p class="auth-sub">Sign in with your company account.</p>

    <form id="login-form" class="auth-form" autocomplete="on">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="name@company.com" required autofocus>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Your password" required>

      <button type="submit" id="login-btn">Log in</button>
      <p id="login-error" class="auth-error" hidden></p>
    </form>

    <p class="auth-footnote">Accounts are created by an administrator. Contact IT if you don't have one.</p>
  </div>
</main>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
